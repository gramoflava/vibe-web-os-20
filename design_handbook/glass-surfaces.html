<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Outfit', sans-serif; background: #0E0E11; padding: 20px;
    background-image: radial-gradient(1.5px 1.5px at 20px 30px, rgba(255,255,255,0.4), transparent),
      radial-gradient(2px 2px at 80px 60px, rgba(255,255,255,0.6), transparent),
      radial-gradient(1px 1px at 140px 40px, rgba(160,180,255,0.5), transparent);
    background-size: 200px 100px;
  }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .card { flex: 1; min-width: 140px; border-radius: 16px; padding: 16px; display: flex; flex-direction: column; gap: 6px; }
  .card-title { font-size: 13px; font-weight: 600; }
  .card-sub { font-size: 11px; color: rgba(255,255,255,0.5); }
  .section-label { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; margin-top: 16px; }
  .section-label:first-child { margin-top: 0; }
</style>
</head>
<body>
  <div class="section-label">Glass Surfaces — Blur Levels</div>
  <div class="row">
    <div class="card" style="background:rgba(20,20,25,0.4);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);box-shadow:inset 0 1px 1px rgba(255,255,255,0.1)">
      <div class="card-title" style="color:#fff">blur(12px)</div>
      <div class="card-sub">Floating preview<br>Black hole bubble</div>
    </div>
    <div class="card" style="background:rgba(20,20,25,0.4);backdrop-filter:blur(24px) saturate(200%);border:1px solid rgba(255,255,255,0.15);box-shadow:0 20px 60px rgba(0,0,0,0.7),inset 0 1px 1px rgba(255,255,255,0.1)">
      <div class="card-title" style="color:#fff">blur(24px)</div>
      <div class="card-sub">System Island<br>Notifications</div>
    </div>
    <div class="card" style="background:rgba(20,20,25,0.4);backdrop-filter:blur(30px) saturate(150%);border:1px solid rgba(255,255,255,0.15);box-shadow:0 20px 60px rgba(0,0,0,0.7),inset 0 1px 1px rgba(255,255,255,0.1)">
      <div class="card-title" style="color:#fff">blur(30px)</div>
      <div class="card-sub">Command Shelf<br>Context Menu</div>
    </div>
    <div class="card" style="background:rgba(20,20,25,0.4);backdrop-filter:blur(40px) saturate(180%);border:1px solid rgba(255,255,255,0.15);box-shadow:0 20px 60px rgba(0,0,0,0.7),inset 0 1px 1px rgba(255,255,255,0.1)">
      <div class="card-title" style="color:#fff">blur(40px)</div>
      <div class="card-sub">Windows<br>Spotlight modal</div>
    </div>
  </div>
</body>
</html>
