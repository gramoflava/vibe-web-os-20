<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="300" height="300">
  <defs>
    <linearGradient id="discTempGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b32400;stop-opacity:1"></stop> <stop offset="50%" style="stop-color:#ff6600;stop-opacity:1"></stop> <stop offset="100%" style="stop-color:#ffcc66;stop-opacity:1"></stop> </linearGradient>

    
  </defs>

  <g class="rotating-disc">
    <circle class="inflow" cx="100" cy="100" r="90" stroke-width="7" opacity="0.6" style="animation-duration: 25s;"></circle>
    <circle class="inflow" cx="100" cy="100" r="80" stroke-width="6.5" opacity="0.7" style="animation-duration: 22s;"></circle>

    <circle class="inflow" cx="100" cy="100" r="70" stroke-width="6" opacity="0.8" style="animation-duration: 19s;"></circle>
    <circle class="inflow" cx="100" cy="100" r="60" stroke-width="5.5" opacity="0.9" style="animation-duration: 16s;"></circle>

    <circle class="inflow" cx="100" cy="100" r="50" stroke-width="5" style="animation-duration: 13s;"></circle>
    <circle class="inflow" cx="100" cy="100" r="40" stroke-width="4.5" style="animation-duration: 10s;"></circle>
    <circle class="inflow" cx="100" cy="100" r="30" stroke-width="4" style="animation-duration: 7s;"></circle>
    <circle class="inflow" cx="100" cy="100" r="20" stroke-width="3.5" style="animation-duration: 5s;"></circle>
  </g>

  <circle class="central-mass" cx="100" cy="100" r="16"></circle>
  
  <circle cx="100" cy="100" r="17" fill="none" stroke="#fff1cc" stroke-width="0.75" opacity="0.3"></circle>
</svg>