<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Nova OS - A premium browser-based operating system">
    <title>Nova OS</title>

    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/nova-theme.css">
    <link rel="stylesheet" href="css/nova-layout.css">
    <link rel="stylesheet" href="css/nova-window.css">
    <link rel="stylesheet" href="css/nova-effects.css">
    <link rel="stylesheet" href="css/donation.css">

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%236366F1'/></svg>">
</head>
<body>
    <!-- Nova Background -->
    <div id="nova-background">
        <div class="stars-overlay"></div>
        <!-- Fluid meshes/blobs injected via CSS -->
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="noise-overlay"></div>
    </div>

    <!-- Boot Screen -->
    <div id="boot-screen" class="boot-screen">
        <div class="boot-logo">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 80px; height: 80px;">
                <circle cx="50" cy="50" r="40" stroke="url(#gradient)" stroke-width="8"/>
                <circle cx="50" cy="50" r="20" fill="white"/>
                <defs>
                    <linearGradient id="gradient" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
                        <stop stop-color="#4F46E5" />
                        <stop offset="1" stop-color="#EC4899" />
                    </linearGradient>
                </defs>
            </svg>
        </div>
        <div class="boot-progress-bar">
            <div id="boot-progress" class="boot-progress-fill"></div>
        </div>
    </div>

    <!-- Main Desktop -->
    <div id="desktop" class="desktop" style="display: none;">
        
        <!-- Top System Island -->
        <div id="nova-island-container">
            <div id="nova-island" class="nova-island">
                <div class="island-left">
                    <span id="island-app-name" class="island-app-name">Nova</span>
                </div>
                <div class="island-center">
                    <span id="island-clock" class="island-clock">---</span>
                </div>
                <div class="island-right">
                    <button class="island-btn" id="btn-search" aria-label="Search">
                        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </button>
                    <button class="island-btn" id="btn-mute" aria-label="Audio Toggle">
                        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                    </button>
                    <button class="island-btn" id="btn-notify" aria-label="Notifications">
                         <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Desktop Content Area for Windows -->
        <div id="desktop-content" class="window-layer">
            <!-- Dynamic windows injected here -->
        </div>

        <!-- Spotlight Search Overlay -->
        <div id="spotlight-overlay" class="spotlight-overlay" style="display:none;">
            <div class="spotlight-modal">
                <input type="text" id="spotlight-input" class="spotlight-input" placeholder="Search Nova..." autocomplete="off" spellcheck="false" />
                <div id="spotlight-results" class="spotlight-results"></div>
            </div>
        </div>

        <!-- Bottom Command Shelf -->
        <div id="nova-shelf-container">
            <div id="nova-shelf" class="nova-shelf">
                <!-- Shelf items (apps) injected here -->
            </div>
        </div>

        <!-- Notifications -->
        <div id="notifications-container" class="notifications-container"></div>
        
        <!-- Context Menu -->
        <div id="context-menu" class="context-menu" style="display: none;"></div>

        <!-- Ko-fi Donation Widget -->
        <div id="kofi-floater" class="kofi-floater" title="Support my work">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M3 14c.83 .642 2.077 1.017 3.5 1c1.423 .017 2.67 -.358 3.5 -1c.83 -.642 2.077 -1.017 3.5 -1c1.423 -.017 2.67 .358 3.5 1" /><path d="M8 3a2.4 2.4 0 0 0 -1 2a2.4 2.4 0 0 0 1 2" /><path d="M12 3a2.4 2.4 0 0 0 -1 2a2.4 2.4 0 0 0 1 2" /><path d="M3 10h14v5a6 6 0 0 1 -6 6h-2a6 6 0 0 1 -6 -6v-5z" /><path d="M16.746 16.726a3 3 0 1 0 .252 -5.555" /></svg>
        </div>

        <div id="kofi-panel" class="kofi-panel hidden">
            <iframe id='kofiframe' src='https://ko-fi.com/gramoflava/?hidefeed=true&widget=true&embed=true&preview=true' style='border:none;width:100%;padding:0;background:transparent;' height='660' title='gramoflava'></iframe>
        </div>

        <div id="kofi-close" class="kofi-floater hidden">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M17 3.34a10 10 0 1 1 -14.995 8.984l-.005 -.324l.005 -.324a10 10 0 0 1 14.995 -8.336zm-6.489 5.8a1 1 0 0 0 -1.218 1.567l1.292 1.293l-1.292 1.293l-.083 .094a1 1 0 0 0 1.497 1.32l1.293 -1.292l1.293 1.292l.094 .083a1 1 0 0 0 1.32 -1.497l-1.292 -1.293l1.292 -1.293l.083 -.094a1 1 0 0 0 -1.497 -1.32l-1.293 1.292l-1.293 -1.292l-.094 -.083z" /></svg>
        </div>

        <script>
            (function() {
                const floater = document.getElementById('kofi-floater');
                const panel = document.getElementById('kofi-panel');
                const closeBtn = document.getElementById('kofi-close');

                floater.addEventListener('click', () => {
                    floater.classList.add('hidden');
                    closeBtn.classList.remove('hidden');
                    panel.classList.remove('hidden');
                });

                closeBtn.addEventListener('click', () => {
                    panel.classList.add('hidden');
                    closeBtn.classList.add('hidden');
                    floater.classList.remove('hidden');
                });
            })();
        </script>
    </div>

    <!-- Utilities -->
    <script src="js/utils/icons.js"></script>

    <!-- Core OS Logic -->
    <script src="js/core/audio.js"></script>
    <script src="js/core/bus.js"></script>
    <script src="js/core/fs.js"></script>
    <script src="js/core/scores.js"></script>
    <script src="js/core/window-manager.js"></script>
    <script src="js/core/effects.js"></script>
    <script src="js/core/app-registry.js"></script>
    <script src="js/core/shelf.js"></script>
    <script src="js/core/island.js"></script>
    <script src="js/core/spotlight.js"></script>
    <script src="js/core/shell.js"></script>
    <script src="js/core/boot.js"></script>

    <!-- Shared/Subsystems Apps -->
    <script src="js/apps/scores.js"></script>

    <!-- Apps -->
    <script src="js/apps/settings.js"></script>
    <script src="js/apps/calculator.js"></script>
    <script src="js/apps/game2048.js"></script>
    <script src="js/apps/minesweeper.js"></script>
    <script src="js/apps/colorlines.js"></script>
    <script src="js/apps/wordl.js"></script>
    <script src="js/apps/codex.js"></script>

    <!-- Main Initialization -->
    <script src="js/main.js"></script>
</body>
</html>
